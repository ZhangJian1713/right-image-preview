name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
      - feature-init   # also deploy from the current dev branch

  # Allow triggering the workflow manually from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel any in-progress run
# so we never serve a stale version while a newer build is queued.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build demo app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build
        # vite.config.ts sets base: '/right-image-preview/' so all
        # asset paths are correct for GitHub Pages sub-path serving.

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
